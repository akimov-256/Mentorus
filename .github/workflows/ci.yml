name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.10.0'
  APP_NAME: appMentorus

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtimageformats
          cache: true

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ---------------- Linux packaging ----------------
      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          set -e
          APPDIR=package/${{ env.APP_NAME }}
          mkdir -p "$APPDIR"
          cp build/${{ env.APP_NAME }} "$APPDIR"/

          wget -q "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage" -O linuxdeployqt.AppImage
          chmod +x linuxdeployqt.AppImage

          ./linuxdeployqt.AppImage "$APPDIR/${{ env.APP_NAME }}" -qmake="$(command -v qmake6 || command -v qmake)" -bundle-non-qt-libs -verbose=1

          cd package
          tar -czf ../${{ env.APP_NAME }}-linux-x86_64.tar.gz ${{ env.APP_NAME }}

      # ---------------- Windows packaging ----------------
      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $AppDir = "package\${{ env.APP_NAME }}"
          New-Item -ItemType Directory -Force -Path $AppDir | Out-Null
          Copy-Item "build\${{ env.BUILD_TYPE }}\${{ env.APP_NAME }}.exe" -Destination $AppDir

          & windeployqt.exe --release "$AppDir\${{ env.APP_NAME }}.exe"

          Compress-Archive -Path "$AppDir\*" -DestinationPath "${{ env.APP_NAME }}-windows-x86_64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: |
            ${{ env.APP_NAME }}-linux-x86_64.tar.gz
            ${{ env.APP_NAME }}-windows-x86_64.zip
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false